# ✅ TAREFA HIGH-10: Deploy Real no K8s
# Configuração de deploy para produção

apiVersion: v1
kind: Namespace
metadata:
  name: rsv360-production
---
apiVersion: v1
kind: Secret
metadata:
  name: rsv360-secrets
  namespace: rsv360-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/rsv360"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "your-jwt-secret-here"
  OPENWEATHER_API_KEY: "your-openweather-key"
  MERCADO_PAGO_ACCESS_TOKEN: "your-mercadopago-token"
  NEXT_PUBLIC_API_URL: "https://api.seudominio.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsv360-backend
  namespace: rsv360-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rsv360-backend
  template:
    metadata:
      labels:
        app: rsv360-backend
    spec:
      containers:
      - name: backend
        image: rsv360/backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: rsv360-secrets
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rsv360-backend-service
  namespace: rsv360-production
spec:
  selector:
    app: rsv360-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rsv360-backend-hpa
  namespace: rsv360-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rsv360-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

