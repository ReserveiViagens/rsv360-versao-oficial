apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rsv-gen2
  labels:
    app: prometheus
    component: monitoring
data:
  prometheus.yml: |
    # Configuração global do Prometheus
    global:
      scrape_interval: 15s          # Intervalo de coleta de métricas
      evaluation_interval: 15s       # Intervalo de avaliação de regras de alerta
      external_labels:
        cluster: 'rsv-gen2'
        environment: 'production'
        monitor: 'prometheus'

    # Configuração de alertas
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager.rsv-gen2.svc.cluster.local:9093

    # Configuração de regras de alerta
    rule_files:
      - "/etc/prometheus/alert-rules/*.yaml"

    # Configurações de scrape (targets para coletar métricas)
    scrape_configs:
      # ============================================
      # Next.js Application (Porta 3000)
      # ============================================
      - job_name: 'rsv-gen2-app'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - rsv-gen2
        relabel_configs:
          # Selecionar apenas endpoints do serviço da aplicação
          - source_labels: [__meta_kubernetes_service_name]
            regex: 'rsv-gen2-app-service'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: 'http'
            action: keep
          # Adicionar labels úteis
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Configurar o path de métricas
          - target_label: __metrics_path__
            replacement: '/api/metrics'
          # Configurar o scheme
          - target_label: __scheme__
            replacement: 'http'
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: '/api/metrics'

      # ============================================
      # WebSocket Server (Porta 3001)
      # ============================================
      - job_name: 'rsv-gen2-websocket'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - rsv-gen2
        relabel_configs:
          # Selecionar apenas endpoints do serviço WebSocket
          - source_labels: [__meta_kubernetes_service_name]
            regex: 'rsv-gen2-websocket-service'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: 'ws'
            action: keep
          # Adicionar labels úteis
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Configurar o path de métricas
          - target_label: __metrics_path__
            replacement: '/api/metrics'
          # Configurar o scheme
          - target_label: __scheme__
            replacement: 'http'
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: '/api/metrics'

      # ============================================
      # Prometheus Self-Monitoring
      # ============================================
      - job_name: 'prometheus'
        static_configs:
          - targets:
              - 'localhost:9090'
            labels:
              job: 'prometheus'
              instance: 'prometheus-server'

      # ============================================
      # PostgreSQL Exporter (Opcional - requer deploy)
