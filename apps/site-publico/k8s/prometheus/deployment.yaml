apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rsv-gen2
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  # Para alta disponibilidade, aumentar para 2 e configurar StatefulSet
  selector:
    matchLabels:
      app: prometheus
      component: monitoring
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        imagePullPolicy: IfNotPresent
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=30d'
          - '--storage.tsdb.retention.size=50GB'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
          - '--web.enable-lifecycle'
          # Habilitar admin API para reload de configuração
          - '--web.enable-admin-api'
        ports:
        - name: web
          containerPort: 9090
          protocol: TCP
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
          readOnly: true
        - name: prometheus-alert-rules
          mountPath: /etc/prometheus/alert-rules
          readOnly: true
        - name: prometheus-storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-alert-rules
        configMap:
          name: prometheus-alert-rules
      - name: prometheus-storage
        persistentVolumeClaim:
          claimName: prometheus-pvc
      # Service Account para acessar Kubernetes API (se necessário)
      # serviceAccountName: prometheus
      # Para usar service discovery do Kubernetes, descomente:
      # serviceAccountName: prometheus
      # e crie um ServiceAccount com permissões apropriadas

