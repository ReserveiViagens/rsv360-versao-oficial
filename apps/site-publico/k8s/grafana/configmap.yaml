apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: rsv-gen2
  labels:
    app: grafana
    component: monitoring
data:
  # Configuração de data sources (provisioning)
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.rsv-gen2.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST
        version: 1

  # Configuração de dashboards (provisioning)
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: 'RSV Gen 2 Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

