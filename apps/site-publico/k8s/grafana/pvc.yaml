apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: rsv-gen2
  labels:
    app: grafana
    component: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Ajustar conforme o StorageClass disponível no cluster
  storageClassName: standard
  # Se não houver StorageClass padrão, remova a linha acima e use:
  # volumeMode: Filesystem

