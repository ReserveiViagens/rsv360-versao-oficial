apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: rsv-gen2
  labels:
    app: grafana
    component: monitoring
spec:
  type: ClusterIP
  # Para acesso externo, altere para NodePort ou LoadBalancer
  # type: NodePort
  # type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: grafana
    component: monitoring
  sessionAffinity: None

