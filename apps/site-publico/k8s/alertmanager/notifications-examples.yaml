# 📧 Exemplos de Configuração de Notificações para Alertmanager
# 
# Como usar:
# 1. Escolha o exemplo que deseja usar (Email, Slack, ou ambos)
# 2. Edite os valores (emails, webhooks, etc.)
# 3. Copie a seção relevante para o ConfigMap:
#    kubectl edit configmap alertmanager-config -n rsv-gen2
# 4. Reinicie o Alertmanager:
#    kubectl rollout restart deployment/alertmanager -n rsv-gen2
#
# OU use o script: ./scripts/configure-notifications.sh

# ============================================
# EXEMPLO 1: EMAIL (SMTP) - Gmail
# ============================================
# 
# Nota: Para Gmail, você precisa criar uma "App Password":
# 1. Acesse: https://myaccount.google.com/apppasswords
# 2. Gere uma senha de app
# 3. Use essa senha no campo smtp_auth_password
#
global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@rsv-gen2.com'
  smtp_auth_username: 'alerts@rsv-gen2.com'
  smtp_auth_password: 'SUA_SENHA_APP_AQUI'  # ⚠️ Use Secret em produção!
  smtp_require_tls: true

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'
    - match:
        severity: info
      receiver: 'info-alerts'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'default-alerts@rsv-gen2.com'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'on-call@rsv-gen2.com'
        headers:
          Subject: '🚨 CRÍTICO - RSV Gen 2: {{ .GroupLabels.alertname }}'
        html: |
          <h2>🚨 Alerta Crítico</h2>
          <p><strong>Alerta:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Severidade:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Componente:</strong> {{ .CommonLabels.component }}</p>
          <p><strong>Descrição:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Valor:</strong> {{ .CommonAnnotations.value }}</p>
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'team@rsv-gen2.com'
        headers:
          Subject: '⚠️ WARNING - RSV Gen 2: {{ .GroupLabels.alertname }}'
        send_resolved: true

  - name: 'info-alerts'
    email_configs:
      - to: 'info@rsv-gen2.com'
        headers:
          Subject: 'ℹ️ INFO - RSV Gen 2: {{ .GroupLabels.alertname }}'
        send_resolved: true

# ============================================
# EXEMPLO 2: SLACK
# ============================================
# 
# Para criar um webhook do Slack:
# 1. Acesse: https://api.slack.com/apps
# 2. Crie um novo app ou use um existente
# 3. Vá em "Incoming Webhooks"
# 4. Ative e crie um webhook
# 5. Copie a URL do webhook
#
global:
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default-receiver'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRÍTICO: {{ .GroupLabels.alertname }}'
        text: |
          *Severidade:* {{ .CommonLabels.severity }}
          *Componente:* {{ .CommonLabels.component }}
          *Descrição:* {{ .CommonAnnotations.description }}
          *Valor:* {{ .CommonAnnotations.value }}
        color: 'danger'
        send_resolved: true
        fields:
          - title: 'Alerta'
            value: '{{ .GroupLabels.alertname }}'
            short: false
          - title: 'Severidade'
            value: '{{ .CommonLabels.severity }}'
            short: true
          - title: 'Componente'
            value: '{{ .CommonLabels.component }}'
            short: true

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#alerts-warning'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Descrição:* {{ .CommonAnnotations.description }}
        color: 'warning'
        send_resolved: true

# ============================================
# EXEMPLO 3: EMAIL + SLACK (AMBOS)
# ============================================
#
# Use este exemplo se quiser receber notificações em ambos os canais
#
global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@rsv-gen2.com'
  smtp_auth_username: 'alerts@rsv-gen2.com'
  smtp_auth_password: 'SUA_SENHA_APP'
  smtp_require_tls: true
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'default-alerts@rsv-gen2.com'
        send_resolved: true
    slack_configs:
      - channel: '#alerts'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'on-call@rsv-gen2.com'
        headers:
          Subject: '🚨 CRÍTICO - RSV Gen 2: {{ .GroupLabels.alertname }}'
        send_resolved: true
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRÍTICO: {{ .GroupLabels.alertname }}'
        text: |
          *Descrição:* {{ .CommonAnnotations.description }}
        color: 'danger'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'team@rsv-gen2.com'
        headers:
          Subject: '⚠️ WARNING - RSV Gen 2: {{ .GroupLabels.alertname }}'
        send_resolved: true
    slack_configs:
      - channel: '#alerts-warning'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        color: 'warning'
        send_resolved: true

# ============================================
# EXEMPLO 4: USANDO SECRETS (RECOMENDADO)
# ============================================
#
# Para maior segurança, use Secrets para senhas
#
# 1. Criar Secret:
#    kubectl create secret generic alertmanager-secrets \
#      --from-literal=smtp-password=SUA_SENHA \
#      --from-literal=slack-webhook-url=WEBHOOK_URL \
#      -n rsv-gen2
#
# 2. No ConfigMap, referencie o Secret:
#
global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@rsv-gen2.com'
  smtp_auth_username: 'alerts@rsv-gen2.com'
  # smtp_auth_password será injetado via Secret no Deployment
  smtp_require_tls: true

# No deployment.yaml, adicione:
# env:
#   - name: SMTP_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: alertmanager-secrets
#         key: smtp-password

