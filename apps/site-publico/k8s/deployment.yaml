apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsv-gen2-app
  namespace: rsv-gen2
  labels:
    app: rsv-gen2
    component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rsv-gen2
      component: app
  template:
    metadata:
      labels:
        app: rsv-gen2
        component: app
    spec:
      containers:
      - name: app
        image: rsv-gen2:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: rsv-gen2-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: rsv-gen2-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rsv-gen2-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: rsv-gen2-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: rsv-gen2-secrets
              key: JWT_SECRET
        envFrom:
        - configMapRef:
            name: rsv-gen2-config
        - secretRef:
            name: rsv-gen2-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
      restartPolicy: Always

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsv-gen2-websocket
  namespace: rsv-gen2
  labels:
    app: rsv-gen2
    component: websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rsv-gen2
      component: websocket
  template:
    metadata:
      labels:
        app: rsv-gen2
        component: websocket
    spec:
      containers:
      - name: websocket
        image: rsv-gen2-websocket:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: ws
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rsv-gen2-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: rsv-gen2-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
      restartPolicy: Always
