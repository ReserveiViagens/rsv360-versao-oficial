openapi: 3.0.0
info:
  title: API de Fidelidade (Loyalty)
  description: API para gerenciamento do programa de fidelidade
  version: 1.0.0

paths:
  /api/loyalty/points:
    get:
      summary: Obter pontos do usuário
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
          description: ID do usuário (apenas admin)
      responses:
        '200':
          description: Pontos do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoyaltyPoints'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/loyalty/tiers:
    get:
      summary: Listar tiers disponíveis
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de tiers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoyaltyTier'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/loyalty/rewards:
    get:
      summary: Listar recompensas disponíveis
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      parameters:
        - name: min_points
          in: query
          schema:
            type: integer
        - name: max_points
          in: query
          schema:
            type: integer
        - name: reward_type
          in: query
          schema:
            type: string
            enum: [discount, free_night, upgrade, cashback, gift, voucher]
      responses:
        '200':
          description: Lista de recompensas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoyaltyReward'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/loyalty/rewards/{id}:
    get:
      summary: Obter detalhes de uma recompensa
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalhes da recompensa
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoyaltyReward'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/loyalty/history:
    get:
      summary: Obter histórico de transações e resgates
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [transactions, redemptions, all]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Histórico de transações e resgates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      transactions:
                        type: array
                        items:
                          $ref: '#/components/schemas/LoyaltyTransaction'
                      redemptions:
                        type: array
                        items:
                          $ref: '#/components/schemas/LoyaltyRedemption'

  /api/loyalty/redemptions:
    post:
      summary: Resgatar uma recompensa
      tags:
        - Loyalty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reward_id
              properties:
                reward_id:
                  type: integer
                user_id:
                  type: integer
                booking_id:
                  type: integer
      responses:
        '200':
          description: Resgate realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LoyaltyRedemption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    LoyaltyPoints:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        current_points:
          type: integer
        lifetime_points:
          type: integer
        points_redeemed:
          type: integer
        tier:
          type: string
          enum: [bronze, silver, gold, platinum, diamond]
        tier_points_required:
          type: integer
        last_activity_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoyaltyTier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        min_points:
          type: integer
        max_points:
          type: integer
          nullable: true
        discount_percentage:
          type: number
        free_shipping:
          type: boolean
        priority_support:
          type: boolean
        exclusive_offers:
          type: boolean
        bonus_points_multiplier:
          type: number
        tier_order:
          type: integer
        is_active:
          type: boolean

    LoyaltyReward:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        points_required:
          type: integer
        reward_type:
          type: string
          enum: [discount, free_night, upgrade, cashback, gift, voucher]
        reward_value:
          type: number
        is_active:
          type: boolean
        stock_quantity:
          type: integer
          nullable: true
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date

    LoyaltyTransaction:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        transaction_type:
          type: string
          enum: [earned, redeemed, expired, adjusted, bonus, refund]
        points:
          type: integer
        points_before:
          type: integer
        points_after:
          type: integer
        reference_type:
          type: string
        reference_id:
          type: integer
        description:
          type: string
        created_at:
          type: string
          format: date-time

    LoyaltyRedemption:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        reward_id:
          type: integer
        points_used:
          type: integer
        reward_value:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected, used, expired]
        code:
          type: string
        coupon_code:
          type: string
        expires_at:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Não autenticado

    Forbidden:
      description: Não autorizado
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Não autorizado

    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Recurso não encontrado

    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Pontos insuficientes

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

