name: CI - RSV Gen 2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Testes e Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: onboarding_rsv
          POSTGRES_PASSWORD: senha_segura_123
          POSTGRES_DB: onboarding_rsv_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar lint
        run: npm run lint
        continue-on-error: true

      - name: Executar testes
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: onboarding_rsv_db_test
          DB_USER: onboarding_rsv
          DB_PASSWORD: senha_segura_123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  security:
    name: Análise de Segurança
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
